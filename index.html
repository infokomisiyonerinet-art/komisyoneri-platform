<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMISIYONERI — CONNECTPRO SERVICES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        /* Nafashe CSS yawe yose nk'uko yari iri muri file yawe */
        :root { --navy: #0D3B8C; --blue: #1657CC; --gold: #F5A623; --dark: #0F1B35; --light: #F4F7FC; --white: #fff; --border: #DDE5F5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--white); color: var(--dark); line-height: 1.6; overflow-x: hidden; }
        .topnav { position: fixed; top: 0; left: 0; right: 0; height: 64px; background-color: rgba(255, 255, 255, 0.97); backdrop-filter: blur(10px); border-bottom: 1.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 4%; z-index: 1000; transition: all 0.3s ease; }
        /* Ibisigaye byose bya CSS yawe biri hano... */
        .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; padding: 0 4% 80px; }
    </style>
</head>
<body>

    <nav class="topnav">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 32px; height: 32px; background: url('https://upload.wikimedia.org/wikipedia/commons/1/17/Google_Chat_icon_%282020%29.svg') center/contain no-repeat;"></div>
            <div>
                <div style="font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 700; color: var(--navy); line-height: 1; letter-spacing: -0.02em;">KOMISIYONERI</div>
                <div style="font-size: 0.65rem; font-weight: 600; color: #6B7A99; letter-spacing: 0.05em; margin-top: 2px;">CONNECTPRO SERVICES</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div style="display: flex; background: var(--light); padding: 4px; border-radius: 12px; border: 1px solid var(--border);">
                <button style="padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.75rem; font-weight: 700; cursor: pointer; background: var(--white); color: var(--navy); box-shadow: 0 2px 4px rgba(13, 59, 140, 0.1);">RW</button>
                <button style="padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.75rem; font-weight: 700; cursor: pointer; background: transparent; color: #6B7A99;">EN</button>
            </div>
            <button style="width: 40px; height: 40px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--navy);">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
    </nav>

    <section style="background: linear-gradient(rgba(13, 59, 140, 0.85), rgba(13, 59, 140, 0.75)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=2000&q=80') center/cover; padding: 160px 4% 100px; color: var(--white);">
        <div style="max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 400px; gap: 60px; align-items: center;">
            <div>
                <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 4rem; line-height: 1.05; font-weight: 700; margin-bottom: 24px;">Shakisha, Gura, <br>Gurisha</h1>
                <p style="font-size: 1.15rem; color: rgba(255,255,255,0.9); max-width: 500px; margin-bottom: 40px;">Duhuza abantu n'imitungo itimurika mu buryo bworoshye, bwizewe, n'ubwigufi.</p>
            </div>
            <div style="background: var(--white); border-radius: 24px; padding: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.25);">
                <h3 style="color: var(--navy); margin-bottom: 20px;">Shyiraho Umutungo</h3>
                <form id="uploadForm">
                    <input type="text" id="title" placeholder="Izina ry'inzu" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="price" placeholder="Igiciro" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="loc" placeholder="Aho iri" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="img" placeholder="Link y'ifoto (PostImages)" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
                    <button type="submit" style="width:100%; background:var(--navy); color:white; padding:15px; border-radius:12px; border:none; font-weight:700;">Ohereza</button>
                </form>
            </div>
        </div>
    </section>

    <div id="listings-container" class="property-grid" style="margin-top: 50px;">
        <p style="text-align:center; grid-column: 1/-1;">Itegerezwa...</p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        async function fetchListings() {
            const container = document.getElementById('listings-container');
            const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            container.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div style="background:white; border-radius:20px; overflow:hidden; border:1.5px solid #DDE5F5;">
                        <img src="${data.img || 'https://via.placeholder.com/400x250'}" style="width:100%; height:240px; object-fit:cover;">
                        <div style="padding:24px;">
                            <div style="color:var(--navy); font-weight:700; font-size:1.25rem;">${data.price}</div>
                            <h4 style="margin:8px 0;">${data.title}</h4>
                            <p style="color:#6B7A99; font-size:0.9rem;">${data.loc}</p>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "listings"), {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                loc: document.getElementById('loc').value,
                img: document.getElementById('img').value,
                createdAt: new Date()
            });
            alert("Byageze kuri Platform!");
            fetchListings();
        };

        window.onload = fetchListings;
    </script>
</body>
</html>
