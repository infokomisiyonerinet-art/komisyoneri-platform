<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMISIYONERI — Imitungo mu Rwanda</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0D3B8C; --blue: #1657CC; --gold: #F5A623; --dark: #0F1B35;
            --light: #F4F7FC; --white: #fff; --border: #DDE5F5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #fff; overflow-x: hidden; }

        /* TOP NAV */
        .topnav {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(10px);
            border-bottom: 1.5px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; padding: 0 4%; z-index: 1000;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--navy); }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(rgba(13, 59, 140, 0.8), rgba(13, 59, 140, 0.8)), 
                        url('https://images.unsplash.com/photo-1580060839134-75a5edca2e99?w=1200&q=80') center/cover;
            min-height: 80vh; display: flex; align-items: center; padding: 100px 4% 40px;
        }
        .hero-inner {
            max-width: 1200px; margin: 0 auto; width: 100%;
            display: grid; grid-template-columns: 1fr 400px; gap: 40px;
        }
        .hero h1 { color: #fff; font-size: clamp(2.5rem, 5vw, 3.5rem); font-family: 'Cormorant Garamond', serif; line-height: 1.1; }
        .hero h1 em { color: var(--gold); font-style: normal; }

        /* SEARCH CARD */
        .s-card {
            background: #fff; border-radius: 22px; padding: 1.8rem;
            box-shadow: 0 24px 72px rgba(0,0,0,0.25);
        }
        .s-field { margin-bottom: 1.2rem; }
        .s-field label { font-size: 0.65rem; font-weight: 800; color: #6B7A99; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .s-field input, .s-field select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; }
        .s-btn { 
            width: 100%; background: var(--navy); color: #fff; border: none; 
            padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer;
            transition: 0.3s;
        }

        /* PROPERTY GRID */
        .p-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; margin-top: 30px;
        }
        .p-card {
            background: #fff; border: 1.5px solid var(--border); border-radius: 14px;
            overflow: hidden; transition: 0.3s;
        }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .p-img { width: 100%; height: 200px; object-fit: cover; }
        .p-info { padding: 15px; }
        .p-price { color: var(--green, #27A84A); font-weight: 700; font-size: 1.2rem; }

        @media (max-width: 900px) {
            .hero-inner { grid-template-columns: 1fr; text-align: center; }
            .hero h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <nav class="topnav">
        <div class="logo">KOMISIYONERI</div>
    </nav>

    <section class="hero">
        <div class="hero-inner">
            <div class="hero-text">
                <h1>Shakisha Inzu ya <em>Ndoto</em> zawe mu Rwanda.</h1>
                <p style="color: rgba(255,255,255,0.8); margin-top: 20px;">Platform y'imitungo yizewe mu Rwanda.</p>
            </div>

            <div class="s-card">
                <h2 style="margin-bottom:15px; font-family:serif">Shyiraho Umutungo</h2>
                <form id="uploadForm">
                    <div class="s-field"><label>Izina ry'inzu</label><input type="text" id="title" required></div>
                    <div class="s-field"><label>Igiciro</label><input type="text" id="price" required></div>
                    <div class="s-field"><label>Aho iri</label><input type="text" id="location" required></div>
                    <div class="s-field"><label>Link y'Ifoto</label><input type="text" id="imageLink"></div>
                    <button type="submit" class="s-btn">Ohereza kuri KOMISIYONERI</button>
                </form>
            </div>
        </div>
    </section>

    <section style="padding: 60px 4%;">
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2rem;">Imitungo Iheruka</h2>
        <div id="listings-container" class="p-grid">
            <p>Itegerezwa...</p>
        </div>
    </section>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. Gusoma amakuru no kuyerekana
        async function loadListings() {
            const container = document.getElementById('listings-container');
            try {
                const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                container.innerHTML = ""; // Clear loading

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = `
                        <div class="p-card">
                            <img src="${data.imageLink || 'https://via.placeholder.com/300x200'}" class="p-img">
                            <div class="p-info">
                                <h3>${data.title}</h3>
                                <p class="p-price">${data.price}</p>
                                <p style="font-size:0.9rem; color:#666">${data.location}</p>
                                <button class="s-btn" style="margin-top:10px; padding:10px">Contact Agent</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (e) {
                container.innerHTML = "Habaye ikibazo mu gusoma amakuru.";
                console.error(e);
            }
        }

        // 2. Kohereza amakuru mashya
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Itegerezwa...";
            btn.disabled = true;

            const newData = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                location: document.getElementById('location').value,
                imageLink: document.getElementById('imageLink').value,
                createdAt: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "listings"), newData);
                alert("Byageze kuri KOMISIYONERI!");
                e.target.reset();
                loadListings(); // Refresh listings
            } catch (err) {
                alert("Habaye ikibazo!");
            } finally {
                btn.innerText = "Ohereza kuri KOMISIYONERI";
                btn.disabled = false;
            }
        });

        // Hamagara listings urubuga rugifunguka
        window.onload = loadListings;
    </script>
</body>
</html>
