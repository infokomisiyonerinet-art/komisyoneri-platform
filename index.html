<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMISIYONERI — Digital Real Estate Platform</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0D3B8C; --gold: #F5A623; --light-blue: #F4F7FC;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: #F8FAFF; }

        /* HEADER & LOGO yitwa KOMISIYONERI CONNECTPRO SERVICES */
        header {
            background: #fff; padding: 15px 5%; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        .logo-text { color: var(--navy); font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; }
        
        /* HERO SECTION (Ya yindi ifite ifoto y'inzu n'amagambo ya Gold) */
        .hero {
            background: linear-gradient(rgba(13, 59, 140, 0.7), rgba(13, 59, 140, 0.7)), 
                        url('https://images.unsplash.com/photo-1580060839134-75a5edca2e99?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            padding: 80px 5%; text-align: center; color: #fff;
        }
        .hero h1 { font-size: 2.8rem; font-family: 'Cormorant Garamond', serif; margin-bottom: 20px; }
        .hero h1 span { color: var(--gold); }

        /* PROPERTY CARDS - Design twasanze ku mashusho */
        .listings-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; padding: 40px 5%;
        }
        .card {
            background: #fff; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .card-img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 20px; position: relative; }
        .price-tag {
            position: absolute; top: -25px; right: 20px;
            background: #fff; padding: 8px 15px; border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-weight: 700; color: var(--navy);
        }
        .card-title { font-size: 1.2rem; color: var(--navy); margin-bottom: 10px; }
        .location { font-size: 0.85rem; color: #777; text-transform: uppercase; margin-bottom: 15px; }

        /* UPLOAD FORM SECTION */
        .upload-section { background: #fff; padding: 40px 5%; border-top: 1px solid #eee; }
        .form-container { max-width: 500px; margin: 0 auto; background: #F8FAFF; padding: 30px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; background: var(--navy); color: #fff; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">KOMISIYONERI<br><small style="font-size: 0.6rem; letter-spacing: 1px;">CONNECTPRO SERVICES</small></div>
        <div style="display:flex; gap:10px;">
            <button style="border:1px solid #ddd; background:#fff; padding:5px 15px; border-radius:20px; font-size:0.8rem">RW</button>
            <button style="background:none; border:none; font-size:1.5rem">☰</button>
        </div>
    </header>

    <section class="hero">
        <h1>Find, Buy, Sell <br>& <span>Rent Houses</span> in Rwanda 🇷🇼</h1>
        <p>KOMISIYONERI — Rwanda's #1 AI-Powered Real Estate Platform.</p>
    </section>

    <div id="listings-container" class="listings-grid">
        <p style="text-align: center; grid-column: 1/-1;">Itegerezwa...</p>
    </div>

    <section class="upload-section">
        <div class="form-container">
            <h2 style="text-align:center; color:var(--navy); margin-bottom:20px">Shyiraho Umutungo</h2>
            <form id="listingForm">
                <input type="text" id="title" placeholder="Izina ry'inzu (ex: Inzu — Kicukiro)" required>
                <input type="text" id="price" placeholder="Igiciro (ex: 47M RWF)" required>
                <input type="text" id="loc" placeholder="Aho iri (ex: Kicukiro, Busanza)" required>
                <input type="text" id="img" placeholder="Link y'ifoto (PostImages link)">
                <button type="submit" class="btn">Ohereza kuri KOMISIYONERI</button>
            </form>
        </div>
    </section>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Gushaka mazu muri Database
        async function fetchHomes() {
            const container = document.getElementById('listings-container');
            const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            container.innerHTML = "";

            snapshot.forEach(doc => {
                const home = doc.data();
                container.innerHTML += `
                    <div class="card">
                        <img src="${home.img || 'https://via.placeholder.com/400x250'}" class="card-img">
                        <div class="card-content">
                            <div class="price-tag">${home.price}</div>
                            <div class="location">${home.loc}</div>
                            <h3 class="card-title">${home.title}</h3>
                            <button class="btn" style="padding:8px; font-size:0.8rem">Saba Agent — Guhuza Vuba</button>
                        </div>
                    </div>
                `;
            });
        }

        // Kohereza inzu nshya
        document.getElementById('listingForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Itegerezwa...";
            
            await addDoc(collection(db, "listings"), {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                loc: document.getElementById('loc').value,
                img: document.getElementById('img').value,
                createdAt: new Date()
            });
            
            alert("Byamaze kugera kuri Platform!");
            location.reload();
        };

        window.onload = fetchHomes;
    </script>
</body>
</html>
